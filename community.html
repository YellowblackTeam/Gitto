<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

.topbar {
  display:flex;
  align-items:center;
  height:65px;
  background:#fff;
  border-bottom:1px solid #ccc;
  padding:0 15px;
}

.logo { height:40px; }

.content { padding:10px; padding-bottom:70px; }

.card {
  display:flex;
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.card img {
  width:70px;
  height:70px;
  border-radius:10px;
  margin-right:10px;
}

.join-btn {
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  color:#fff;
}

.entrar { background:green; }
.sair { background:red; }

.downbar {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid #ccc;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.icon-btn { text-align:center; font-size:12px; color:black; text-decoration:none; }
.icon-btn i { display:block; font-size:24px; }
</style>
</head>

<body>

<div class="topbar">
  <img src="logo1.png" class="logo">
</div>

<div class="content">

<div class="card">
<img src="https://uablo.com/uploads/profile_image/dd9a3062-7cd6-4563-b4ec-a30bd088976d_org.jpg?m=1762444520">
<div>
<b>Eu odeio acordar cedo</b>
<p>Comunidade clássica criada pela primeira vez no Orkut para quem simplesmente não suporta acordar cedo.</p>
<button class="join-btn entrar" onclick="toggle(this,'c1')">Entrar</button>
</div>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/YellowblackTeam/Gitto/refs/heads/main/IMG-20260428-WA0001.jpg">
<div>
<b>EXOls</b>
<p>Para quem realmente ama o EXO!<br>We Are One Forever!</p>
<button class="join-btn entrar" onclick="toggle(this,'c2')">Entrar</button>
</div>
</div>

</div>

<div class="downbar">
<a href="index.html" class="icon-btn"><i class="material-icons">home</i>Home</a>
<a href="community.html" class="icon-btn"><i class="material-icons">groups</i>Community</a>
<div class="icon-btn" onclick="logout()"><i class="material-icons">logout</i>Logout</div>
<a href="profile.html" class="icon-btn"><i class="material-icons">person</i>Profile</a>
</div>

<script>
function toggle(btn,id){
  if(localStorage.getItem(id)){
    localStorage.removeItem(id);
    btn.innerText="Entrar";
    btn.className="join-btn entrar";
  } else {
    localStorage.setItem(id,"1");
    btn.innerText="Sair";
    btn.className="join-btn sair";
  }
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

</body>
</html>
