<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gitto</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

.topbar {
  display:none;
  align-items:center;
  height:65px;
  background:#fff;
  border-bottom:1px solid #ccc;
  padding:0 15px;
}

.logo { height:40px; }

.login {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login img { height:80px; margin-bottom:20px; }

.login input {
  width:200px;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.login button {
  margin-top:10px;
  padding:10px;
  border:none;
  background:#333;
  color:#fff;
  border-radius:6px;
}

.erro { color:red; display:none; }
.anon { margin-top:8px; cursor:pointer; text-decoration:underline; }

.content {
  display:none;
  padding:10px;
  padding-bottom:70px;
}

.post {
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.downbar {
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid #ccc;
  justify-content:space-around;
  align-items:center;
}

.icon-btn {
  text-align:center;
  font-size:12px;
  text-decoration:none;
  color:black;
}

.icon-btn i {
  display:block;
  font-size:24px;
}
</style>
</head>

<body>

<div class="login" id="login">
  <img src="logo1.png">
  <input id="nome" placeholder="Nome">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Login / Cadastrar</button>
  <div class="erro" id="erro">Preencha os dados</div>
  <div class="anon" onclick="anonimo()">Entrar como anônimo</div>
</div>

<div class="topbar" id="topbar">
  <img src="logo1.png" class="logo">
</div>

<div class="content" id="content">
  <div class="post">
    <b>Yellowblack Studios</b>
    <p>
    Olá! Eu sou o criador do Gitto, Yellowblack. Eu sempre quis fazer uma rede social simples, leve e que funcione em qualquer celular… então decidi criar o Gitto!
    </p>
  </div>
</div>

<div class="downbar" id="downbar">
  <a href="index.html" class="icon-btn">
    <i class="material-icons">home</i>Home
  </a>

  <a href="community.html" class="icon-btn">
    <i class="material-icons">groups</i>Community
  </a>

  <div class="icon-btn" onclick="logout()">
    <i class="material-icons">logout</i>Logout
  </div>

  <a href="profile.html" class="icon-btn">
    <i class="material-icons">person</i>Profile
  </a>
</div>

<script>
window.onload = function() {
  if(localStorage.getItem("user")) liberar();
};

function entrar() {
  if(nome.value=="" || senha.value=="") {
    erro.style.display="block";
  } else {
    localStorage.setItem("user", nome.value);
    liberar();
  }
}

function anonimo() {
  localStorage.setItem("user","Anônimo");
  liberar();
}

function liberar() {
  login.style.display="none";
  topbar.style.display="flex";
  content.style.display="block";
  downbar.style.display="flex";
}

function logout() {
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
