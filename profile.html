<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

.topbar {
  display:flex;
  align-items:center;
  height:65px;
  background:#fff;
  border-bottom:1px solid #ccc;
  padding:0 15px;
}

.logo { height:40px; }

.profile-box {
  display:flex;
  align-items:center;
  padding:15px;
  background:#fff;
  margin:10px;
  border-radius:10px;
}

.pfp {
  width:70px;
  height:70px;
  border-radius:50%;
  margin-right:10px;
}

.name {
  font-size:18px;
  font-weight:bold;
}

.downbar {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid #ccc;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.icon-btn { text-align:center; font-size:12px; color:black; text-decoration:none; }
.icon-btn i { display:block; font-size:24px; }
</style>
</head>

<body>

<div class="topbar">
  <img src="logo1.png" class="logo">
</div>

<div class="profile-box">
  <img src="PFP.png" class="pfp">
  <div class="name" id="nomeUser">Usuário</div>
</div>

<div class="downbar">
<a href="index.html" class="icon-btn"><i class="material-icons">home</i>Home</a>
<a href="community.html" class="icon-btn"><i class="material-icons">groups</i>Community</a>
<div class="icon-btn" onclick="logout()"><i class="material-icons">logout</i>Logout</div>
<a href="profile.html" class="icon-btn"><i class="material-icons">person</i>Profile</a>
</div>

<script>
window.onload = function() {
  var user = localStorage.getItem("user");
  document.getElementById("nomeUser").innerText = user ? user : "Anônimo";
};

function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

</body>
</html>
